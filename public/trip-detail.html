<!doctype html>
<html lang="th" class="">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>รายละเอียดการเดินทาง | Miizternat Journey</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              brand: "#2F4F4F",
              accent: "#E6A15C",
              darkbg: "#0F0F12",
              darkcard: "#1E1E24",
              lightbg: "#F5F5F0",
              lightcard: "#FFFFFF",
            },
            fontFamily: { sans: ["Prompt", "sans-serif"] },
          },
        },
      };
    </script>
    <style>
      .hero-bg-detail {
        background-size: cover;
        background-position: center;
      }
    </style>
  </head>
  <body
    class="antialiased bg-lightbg text-gray-800 dark:bg-darkbg dark:text-gray-200 transition-colors duration-300"
  >
    <nav
      class="fixed w-full z-40 bg-white/95 dark:bg-[#0F0F12]/95 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 transition-all py-4 px-6 md:px-12 flex justify-between items-center shadow-sm"
    >
      <a
        href="index.html"
        class="flex items-center gap-2 text-xl font-bold text-brand dark:text-white hover:text-accent transition-colors"
      >
        <i class="fa-solid fa-arrow-left text-lg"></i> กลับหน้าแรก
      </a>
      <button
        id="theme-toggle"
        class="p-2 rounded-full bg-gray-200 dark:bg-gray-800 hover:bg-gray-300 dark:hover:bg-gray-700 transition-colors"
      >
        <i
          id="theme-icon"
          class="fa-solid fa-moon text-gray-700 dark:text-yellow-400"
        ></i>
      </button>
    </nav>

    <section
      id="detail-hero"
      class="hero-bg-detail h-[50vh] min-h-[400px] flex items-end pb-12 px-6 md:px-12 relative"
      style="background-color: #111"
    >
      <div class="max-w-5xl mx-auto w-full z-10">
        <span
          id="trip-tag"
          class="bg-accent text-white px-3 py-1 rounded-full text-sm font-medium mb-4 inline-block"
          ><i class="fa-solid fa-tag"></i> กำลังโหลด...</span
        >
        <h1
          id="trip-title"
          class="text-4xl md:text-5xl font-bold text-white mb-3 text-shadow"
        >
          ...
        </h1>
        <div
          class="flex flex-wrap gap-4 text-gray-200 text-sm md:text-base drop-shadow-md"
        >
          <span id="trip-date"><i class="fa-regular fa-calendar"></i> ...</span>
        </div>
      </div>
    </section>

    <main class="max-w-5xl mx-auto px-6 md:px-12 py-12 -mt-10 relative z-20">
      <div
        class="bg-lightcard dark:bg-darkcard p-6 md:p-8 rounded-2xl shadow-lg border border-gray-200 dark:border-gray-800 mb-10 flex flex-col md:flex-row items-center gap-6"
      >
        <div class="flex-shrink-0 text-center">
          <p
            class="text-sm text-gray-500 dark:text-gray-400 mb-2 uppercase tracking-wide"
          >
            คะแนนรวม
          </p>
          <div
            class="w-24 h-24 rounded-full border-4 border-accent flex items-center justify-center text-3xl font-bold text-brand dark:text-white"
            id="overall-score"
          >
            ...
          </div>
        </div>
        <div class="flex-1">
          <h3 class="text-xl font-bold text-gray-800 dark:text-white mb-2">
            <i class="fa-solid fa-quote-left text-accent opacity-50 mr-2"></i
            >สรุปความประทับใจ
          </h3>
          <p
            id="overall-text"
            class="text-gray-700 dark:text-gray-300 leading-relaxed text-lg"
          >
            ...
          </p>
        </div>
      </div>

      <h3
        class="text-2xl font-bold text-brand dark:text-white mb-6 border-l-4 border-accent pl-3"
      >
        รายละเอียดการรีวิว
      </h3>

      <div
        id="reviews-container"
        class="prose prose-lg dark:prose-invert max-w-none mb-12 text-gray-700 dark:text-gray-300 font-light"
      ></div>

      <div>
        <h3
          class="text-2xl font-bold text-brand dark:text-white mb-6 border-l-4 border-accent pl-3"
        >
          แกลเลอรี (Gallery)
        </h3>
        <div
          id="gallery-container"
          class="columns-1 sm:columns-2 md:columns-3 gap-4 space-y-4"
        ></div>
      </div>
    </main>

    <footer
      class="bg-gray-200 dark:bg-[#0B0B0E] py-8 border-t border-gray-300 dark:border-gray-800 text-center text-sm text-gray-600 dark:text-gray-500 mt-12"
    >
      <p>
        <i class="fa-solid fa-mountain text-accent mr-1"></i> © 2026 Miizternat
        Journey.
      </p>
    </footer>

    <div
      id="lightbox"
      class="fixed inset-0 z-50 bg-black/95 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300"
    >
      <button
        onclick="closeLightbox()"
        class="absolute top-6 right-6 text-white text-4xl hover:text-accent transition-colors"
      >
        <i class="fa-solid fa-xmark"></i>
      </button>
      <button
        onclick="prevImage()"
        class="absolute left-4 md:left-10 text-white text-4xl hover:text-accent transition-colors"
      >
        <i class="fa-solid fa-chevron-left"></i>
      </button>
      <img
        id="lightbox-img"
        src=""
        class="max-h-[85vh] max-w-[90vw] object-contain rounded-lg shadow-2xl"
      />
      <button
        onclick="nextImage()"
        class="absolute right-4 md:right-10 text-white text-4xl hover:text-accent transition-colors"
      >
        <i class="fa-solid fa-chevron-right"></i>
      </button>
      <p
        id="lightbox-counter"
        class="absolute bottom-6 text-white font-medium text-lg"
      ></p>
    </div>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const tripSlug = urlParams.get("id");

      let currentImageIndex = 0;
      let galleryImages = [];

      async function loadDetailFromAPI() {
        if (!tripSlug) {
          document.getElementById("trip-title").textContent = "ไม่พบรหัสทริป";
          return;
        }

        try {
          const response = await fetch(
            `${window.location.origin}/api/trips/${tripSlug}`,
          );
          const result = await response.json();
          const trip = result.data;

          if (trip) {
            document.title = `${trip.title} | Miizternat Journey`;
            document.getElementById("trip-title").textContent = trip.title;
            document.getElementById("trip-tag").innerHTML =
              `<i class="fa-solid fa-tag"></i> ${trip.category}`;

            // แก้ไขแสดงวันที่: ใช้ start_date และ end_date
            const startDate = trip.start_date
              ? new Date(trip.start_date).toLocaleDateString("th-TH")
              : "";
            const endDate = trip.end_date
              ? new Date(trip.end_date).toLocaleDateString("th-TH")
              : "";
            document.getElementById("trip-date").innerHTML =
              `<i class="fa-regular fa-calendar"></i> วันที่เดินทาง: ${startDate} - ${endDate}`;

            document.getElementById("detail-hero").style.backgroundImage =
              `linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.9)), url('${trip.cover_image}')`;

            // แก้ไขคะแนน: แสดงเป็น /10 แทน /5
            document.getElementById("overall-score").textContent =
              trip.rating + "/10";
            document.getElementById("overall-text").textContent = trip.summary;
            document.getElementById("reviews-container").innerHTML =
              trip.content;

            // แก้ไข Gallery: ดึงรูปจาก JSON
            galleryImages = trip.gallery
              ? JSON.parse(trip.gallery)
              : [trip.cover_image];
            const galleryContainer =
              document.getElementById("gallery-container");
            galleryContainer.innerHTML = "";

            galleryImages.forEach((imgUrl, index) => {
              const imgBox = document.createElement("div");
              imgBox.className =
                "break-inside-avoid bg-lightcard dark:bg-darkcard p-1 rounded-xl overflow-hidden cursor-pointer shadow-sm border border-gray-200 dark:border-gray-800 group";
              imgBox.innerHTML = `<img src="${imgUrl}" class="w-full h-auto object-cover rounded-lg group-hover:opacity-80 transition-opacity duration-300" onclick="openLightbox(${index})">`;
              galleryContainer.appendChild(imgBox);
            });
          }
        } catch (error) {
          console.error("Error fetching detail:", error);
        }
      }
      loadDetailFromAPI();

      const lightbox = document.getElementById("lightbox");
      const lightboxImg = document.getElementById("lightbox-img");
      const lightboxCounter = document.getElementById("lightbox-counter");

      function openLightbox(index) {
        currentImageIndex = index;
        updateLightbox();
        lightbox.classList.remove("opacity-0", "pointer-events-none");
        document.body.style.overflow = "hidden";
      }

      function closeLightbox() {
        lightbox.classList.add("opacity-0", "pointer-events-none");
        document.body.style.overflow = "auto";
      }

      function nextImage() {
        currentImageIndex = (currentImageIndex + 1) % galleryImages.length;
        updateLightbox();
      }

      function prevImage() {
        currentImageIndex =
          (currentImageIndex - 1 + galleryImages.length) % galleryImages.length;
        updateLightbox();
      }

      function updateLightbox() {
        if (galleryImages.length > 0) {
          lightboxImg.src = galleryImages[currentImageIndex];
          lightboxCounter.textContent = `${currentImageIndex + 1} / ${galleryImages.length}`;
        }
      }

      const htmlElement = document.documentElement;
      const toggleBtnDesktop = document.getElementById("theme-toggle");
      const iconDesktop = document.getElementById("theme-icon");

      if (localStorage.getItem("theme") === "dark") {
        htmlElement.classList.add("dark");
        if (iconDesktop)
          iconDesktop.className = "fa-solid fa-sun text-yellow-400";
      }

      function toggleTheme() {
        htmlElement.classList.toggle("dark");
        const isDark = htmlElement.classList.contains("dark");
        localStorage.setItem("theme", isDark ? "dark" : "light");
        if (iconDesktop)
          iconDesktop.className = isDark
            ? "fa-solid fa-sun text-yellow-400"
            : "fa-solid fa-moon text-gray-700";
      }

      if (toggleBtnDesktop)
        toggleBtnDesktop.addEventListener("click", toggleTheme);
    </script>
  </body>
</html>
