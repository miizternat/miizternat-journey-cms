<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <title>เพิ่ม / แก้ไขทริป | Miizternat CMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>

  <body
    id="admin-body"
    class="bg-[#0F0F12] text-white min-h-screen transition-colors duration-300"
  >
    <div class="flex min-h-screen">
      <aside
        id="admin-sidebar"
        class="w-72 bg-[#111116] border-r border-white/10 transition-colors duration-300 fixed inset-y-0 left-0 hidden lg:flex flex-col"
      >
        <div class="p-6 border-b border-white/10">
          <h1 class="text-xl font-bold">Miizternat CMS</h1>
          <p class="text-xs text-gray-400">Travel Journey Admin</p>
        </div>

        <nav class="flex-1 p-4 space-y-2 text-sm">
          <a
            href="admin-dashboard.html"
            class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:bg-white/10 transition"
          >
            <i class="fa-solid fa-chart-line w-5 text-orange-400"></i>
            Dashboard
          </a>

          <a
            href="admin-list.html"
            class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:bg-white/10 transition"
          >
            <i class="fa-solid fa-map-location-dot w-5 text-orange-400"></i>
            จัดการทริปเดินทาง
          </a>

          <a
            href="admin.html"
            class="flex items-center gap-3 px-4 py-3 rounded-xl bg-orange-400 text-white"
          >
            <i class="fa-solid fa-plus w-5"></i>
            เพิ่มทริปใหม่
          </a>

          <a
            href="admin-settings.html"
            class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:bg-white/10 transition"
          >
            <i class="fa-solid fa-sliders w-5 text-orange-400"></i>
            Website Settings
          </a>

          <button
            id="admin-theme-toggle"
            type="button"
            class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:bg-white/10 hover:text-white transition w-full text-left"
          >
            <i
              id="admin-theme-icon"
              class="fa-solid fa-moon w-5 text-orange-400"
            ></i>
            โหมดสว่าง / มืด
          </button>

          <a
            href="index.html"
            target="_blank"
            class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:bg-white/10 transition"
          >
            <i
              class="fa-solid fa-arrow-up-right-from-square w-5 text-orange-400"
            ></i>
            ดูหน้าเว็บไซต์
          </a>
          <button
            id="logoutBtn"
            type="button"
            class="flex items-center gap-3 px-4 py-3 rounded-xl text-red-400 hover:bg-red-500/10 transition w-full text-left"
          >
            <i class="fa-solid fa-right-from-bracket w-5"></i>
            Logout
          </button>
        </nav>
      </aside>

      <main class="flex-1 lg:ml-72">
        <header
          id="admin-header"
          class="sticky top-0 z-30 bg-[#0F0F12]/90 backdrop-blur-md border-b border-white/10 px-6 py-4 transition-colors duration-300"
        >
          <div class="flex items-center justify-between">
            <div>
              <p class="text-sm text-orange-400 font-medium">Admin CMS</p>
              <h1 id="formTitle" class="text-2xl font-bold">
                เพิ่มทริปการเดินทางใหม่
              </h1>
            </div>

            <a
              href="admin-list.html"
              class="bg-white/10 hover:bg-white/15 text-white px-4 py-2 rounded-xl text-sm transition flex items-center gap-2"
            >
              <i class="fa-solid fa-arrow-left"></i>
              กลับหน้ารายการ
            </a>
          </div>
        </header>

        <section class="p-6 md:p-10">
          <form id="addTripForm" class="max-w-5xl mx-auto space-y-6">
            <div
              class="admin-card bg-[#1E1E24] border border-white/10 rounded-3xl p-6 md:p-8 shadow-xl transition-colors duration-300"
            >
              <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                <i class="fa-solid fa-map-location-dot text-orange-400"></i>
                ข้อมูลหลักของทริป
              </h2>

              <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                  <label class="block text-sm font-semibold mb-2"
                    >รหัส URL (Slug) *</label
                  >
                  <input
                    id="slug"
                    type="text"
                    required
                    placeholder="เช่น doihuaitu-2026"
                    class="admin-input w-full bg-[#111116] border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-orange-400 transition"
                  />
                </div>

                <div>
                  <label class="block text-sm font-semibold mb-2"
                    >ชื่อทริป *</label
                  >
                  <input
                    id="title"
                    type="text"
                    required
                    placeholder="ชื่อทริปที่ต้องการโชว์"
                    class="admin-input w-full bg-[#111116] border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-orange-400 transition"
                  />
                </div>

                <div>
                  <label class="block text-sm font-semibold mb-2"
                    >หมวดหมู่</label
                  >
                  <select
                    id="category"
                    class="admin-input w-full bg-[#111116] border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-orange-400 transition"
                  >
                    <option value="เดินป่า">เดินป่า</option>
                    <option value="อุทยาน">อุทยาน</option>
                    <option value="ทะเล">ทะเล</option>
                    <option value="น้ำตก">น้ำตก</option>
                  </select>
                </div>

                <div>
                  <label class="block text-sm font-semibold mb-2"
                    >คะแนนความประทับใจ (0-10)</label
                  >
                  <input
                    id="rating"
                    type="number"
                    step="0.01"
                    min="0"
                    max="10"
                    required
                    placeholder="เช่น 9.50"
                    class="admin-input w-full bg-[#111116] border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-orange-400 transition"
                  />
                </div>

                <div>
                  <label class="block text-sm font-semibold mb-2"
                    >วันที่เริ่มเดินทาง</label
                  >
                  <input
                    id="start_date"
                    type="date"
                    required
                    class="admin-input w-full bg-[#111116] border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-orange-400 transition"
                  />
                </div>

                <div>
                  <label class="block text-sm font-semibold mb-2"
                    >วันที่สิ้นสุดทริป</label
                  >
                  <input
                    id="end_date"
                    type="date"
                    required
                    class="admin-input w-full bg-[#111116] border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-orange-400 transition"
                  />
                </div>
              </div>
            </div>

            <div
              class="admin-card bg-[#1E1E24] border border-white/10 rounded-3xl p-6 md:p-8 shadow-xl transition-colors duration-300"
            >
              <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                <i class="fa-solid fa-image text-orange-400"></i>
                รูปภาพ
              </h2>

              <label class="block text-sm font-semibold mb-2"
                >URL รูปภาพหน้าปก *</label
              >
              <input
                id="cover_image"
                type="url"
                required
                placeholder="https://..."
                class="admin-input w-full bg-[#111116] border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-orange-400 transition mb-4"
              />

              <div
                id="coverPreviewBox"
                class="rounded-2xl overflow-hidden bg-black/30 border border-white/10 mb-6 transition-colors duration-300"
              >
                <img
                  id="coverPreview"
                  src=""
                  class="w-full h-64 object-cover hidden"
                />
                <div
                  id="coverEmpty"
                  class="h-64 flex items-center justify-center text-gray-500"
                >
                  Preview รูปหน้าปก
                </div>
              </div>

              <label class="block text-sm font-semibold mb-2"
                >รูปภาพเพิ่มเติมใน Gallery</label
              >
              <div id="galleryInputs" class="space-y-2"></div>

              <button
                type="button"
                onclick="addGalleryInput('')"
                class="mt-3 text-sm text-orange-400 hover:text-orange-300 font-medium"
              >
                <i class="fa-solid fa-plus"></i>
                เพิ่มช่องใส่รูปภาพ
              </button>
            </div>

            <div
              class="admin-card bg-[#1E1E24] border border-white/10 rounded-3xl p-6 md:p-8 shadow-xl transition-colors duration-300"
            >
              <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                <i class="fa-solid fa-pen-nib text-orange-400"></i>
                เนื้อหารีวิว
              </h2>

              <div class="space-y-6">
                <div>
                  <label class="block text-sm font-semibold mb-2"
                    >สรุปความประทับใจสั้นๆ</label
                  >
                  <textarea
                    id="summary"
                    rows="3"
                    placeholder="สรุปเนื้อหาสั้นๆ เพื่อโชว์หน้าแรก"
                    class="admin-input w-full bg-[#111116] border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-orange-400 transition"
                  ></textarea>
                </div>

                <div>
                  <label class="block text-sm font-semibold mb-2"
                    >รายละเอียดรีวิว (รองรับ HTML)</label
                  >
                  <textarea
                    id="content"
                    rows="8"
                    placeholder="<p>เนื้อหาแบบละเอียด...</p>"
                    class="admin-input w-full bg-[#111116] border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-orange-400 transition font-mono text-sm"
                  ></textarea>
                </div>
              </div>
            </div>

            <button
              type="submit"
              class="w-full bg-orange-400 hover:bg-orange-500 text-white font-bold py-4 rounded-2xl shadow-lg transition transform hover:-translate-y-0.5"
            >
              <i class="fa-solid fa-save mr-2"></i>
              บันทึกข้อมูลทริป
            </button>
          </form>
        </section>
      </main>
    </div>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const editSlug = urlParams.get("edit");

      function isLightMode() {
        return localStorage.getItem("adminTheme") === "light";
      }

      function applyTheme() {
        const isLight = isLightMode();
        const body = document.getElementById("admin-body");
        const sidebar = document.getElementById("admin-sidebar");
        const header = document.getElementById("admin-header");
        const icon = document.getElementById("admin-theme-icon");

        if (isLight) {
          body.classList.remove("bg-[#0F0F12]", "text-white");
          body.classList.add("bg-slate-100", "text-slate-900");

          sidebar.classList.remove("bg-[#111116]", "border-white/10");
          sidebar.classList.add("bg-white", "border-slate-200");

          header.classList.remove("bg-[#0F0F12]/90", "border-white/10");
          header.classList.add("bg-white/90", "border-slate-200");

          document.querySelectorAll(".admin-card").forEach((card) => {
            card.classList.remove("bg-[#1E1E24]", "border-white/10");
            card.classList.add("bg-white", "border-slate-200");
          });

          document.querySelectorAll(".admin-input").forEach((input) => {
            input.classList.remove(
              "bg-[#111116]",
              "border-white/10",
              "text-white",
            );
            input.classList.add(
              "bg-slate-50",
              "border-slate-300",
              "text-slate-900",
            );
          });

          const previewBox = document.getElementById("coverPreviewBox");
          previewBox.classList.remove("bg-black/30", "border-white/10");
          previewBox.classList.add("bg-slate-50", "border-slate-200");

          icon.className = "fa-solid fa-sun w-5 text-orange-400";
        } else {
          icon.className = "fa-solid fa-moon w-5 text-orange-400";
        }
      }

      document
        .getElementById("admin-theme-toggle")
        .addEventListener("click", () => {
          const current = isLightMode() ? "dark" : "light";
          localStorage.setItem("adminTheme", current);
          location.reload();
        });

      function updateCoverPreview() {
        const url = document.getElementById("cover_image").value;
        const img = document.getElementById("coverPreview");
        const empty = document.getElementById("coverEmpty");

        if (url && url.trim() !== "") {
          img.src = url;

          img.onload = () => {
            img.classList.remove("hidden");
            empty.classList.add("hidden");
          };

          img.onerror = () => {
            img.classList.add("hidden");
            empty.classList.remove("hidden");
          };
        } else {
          img.classList.add("hidden");
          empty.classList.remove("hidden");
        }
      }

      function addGalleryInput(value = "") {
        const container = document.getElementById("galleryInputs");
        const div = document.createElement("div");
        div.className = "flex gap-2";

        div.innerHTML = `
          <input
            type="url"
            class="gallery-url admin-input flex-1 bg-[#111116] border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-orange-400 transition"
            placeholder="https://..."
            value="${value}"
          >
          <button type="button" onclick="this.parentElement.remove()" class="text-red-400 hover:text-red-300 px-3">
            <i class="fa-solid fa-trash"></i>
          </button>
        `;

        container.appendChild(div);

        if (isLightMode()) {
          const input = div.querySelector(".admin-input");
          input.classList.remove(
            "bg-[#111116]",
            "border-white/10",
            "text-white",
          );
          input.classList.add(
            "bg-slate-50",
            "border-slate-300",
            "text-slate-900",
          );
        }
      }

      document
        .getElementById("cover_image")
        .addEventListener("input", updateCoverPreview);

      applyTheme();

      if (editSlug) {
        document.getElementById("formTitle").innerText = "แก้ไขข้อมูลทริป";
        document.getElementById("slug").readOnly = true;
        document.getElementById("slug").classList.add("opacity-60");

        fetch(`${window.location.origin}/api/trips/${editSlug}`, {
          credentials: "include",
        })
          .then((res) => res.json())
          .then((res) => {
            const t = res.data;
            document.getElementById("slug").value = t.slug;
            document.getElementById("title").value = t.title;
            document.getElementById("category").value = t.category;
            document.getElementById("rating").value = t.rating;
            document.getElementById("start_date").value = t.start_date;
            document.getElementById("end_date").value = t.end_date;
            document.getElementById("cover_image").value = t.cover_image;
            document.getElementById("summary").value = t.summary;
            document.getElementById("content").value = t.content;
            updateCoverPreview();

            if (t.gallery) {
              try {
                const images = JSON.parse(t.gallery);
                images.forEach((url) => addGalleryInput(url));
              } catch {
                addGalleryInput("");
              }
            }
          });
      } else {
        addGalleryInput("");
      }

      document
        .getElementById("addTripForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const galleryUrls = Array.from(
            document.querySelectorAll(".gallery-url"),
          )
            .map((input) => input.value)
            .filter((url) => url.trim() !== "");

          const data = {
            slug: document.getElementById("slug").value,
            title: document.getElementById("title").value,
            category: document.getElementById("category").value,
            rating: parseFloat(document.getElementById("rating").value),
            start_date: document.getElementById("start_date").value,
            end_date: document.getElementById("end_date").value,
            cover_image: document.getElementById("cover_image").value,
            summary: document.getElementById("summary").value,
            content: document.getElementById("content").value,
            gallery: JSON.stringify(galleryUrls),
          };

          const response = await fetch(
            editSlug
              ? `${window.location.origin}/api/trips/${editSlug}`
              : `${window.location.origin}/api/trips`,
            {
              method: editSlug ? "PUT" : "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(data),
            },
          );

          if (response.ok) {
            alert("บันทึกข้อมูลสำเร็จ!");
            window.location.href = "admin-list.html";
          } else {
            alert("เกิดข้อผิดพลาดในการบันทึก");
          }
        });
    </script>
    <script>
      document
        .getElementById("logoutBtn")
        ?.addEventListener("click", async () => {
          await fetch(`${window.location.origin}/api/logout`, {
            method: "POST",
            credentials: "include",
          });

          window.location.href = "login.html";
        });
    </script>
  </body>
</html>
