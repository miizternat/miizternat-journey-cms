<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <title>จัดการทริป | Miizternat CMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>

  <body
    id="admin-body"
    class="bg-[#0F0F12] text-white min-h-screen transition-colors duration-300"
  >
    <div class="flex min-h-screen">
      <aside
        id="admin-sidebar"
        class="w-72 bg-[#111116] border-r border-white/10 transition-colors duration-300 fixed inset-y-0 left-0 hidden lg:flex flex-col"
      >
        <div class="p-6 border-b border-white/10">
          <h1 class="text-xl font-bold">Miizternat CMS</h1>
          <p class="text-xs text-gray-400">Travel Journey Admin</p>
        </div>

        <nav class="flex-1 p-4 space-y-2 text-sm">
          <a
            href="admin-dashboard.html"
            class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:bg-white/10 transition"
          >
            <i class="fa-solid fa-chart-line w-5 text-orange-400"></i>
            Dashboard
          </a>

          <a
            href="admin-list.html"
            class="flex items-center gap-3 px-4 py-3 rounded-xl bg-orange-400 text-white"
          >
            <i class="fa-solid fa-map-location-dot w-5"></i>
            จัดการทริปเดินทาง
          </a>

          <a
            href="admin.html"
            class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:bg-white/10 transition"
          >
            <i class="fa-solid fa-plus w-5 text-orange-400"></i>
            เพิ่มทริปใหม่
          </a>

          <a
            href="admin-settings.html"
            class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:bg-white/10 transition"
          >
            <i class="fa-solid fa-sliders w-5 text-orange-400"></i>
            Website Settings
          </a>

          <button
            id="admin-theme-toggle"
            type="button"
            class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:bg-white/10 hover:text-white transition w-full text-left"
          >
            <i
              id="admin-theme-icon"
              class="fa-solid fa-moon w-5 text-orange-400"
            ></i>
            โหมดสว่าง / มืด
          </button>

          <a
            href="index.html"
            target="_blank"
            class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-300 hover:bg-white/10 transition"
          >
            <i
              class="fa-solid fa-arrow-up-right-from-square w-5 text-orange-400"
            ></i>
            ดูหน้าเว็บไซต์
          </a>
          <button
            id="logoutBtn"
            type="button"
            class="flex items-center gap-3 px-4 py-3 rounded-xl text-red-400 hover:bg-red-500/10 transition w-full text-left"
          >
            <i class="fa-solid fa-right-from-bracket w-5"></i>
            Logout
          </button>
        </nav>
      </aside>

      <main class="flex-1 lg:ml-72">
        <header
          id="admin-header"
          class="sticky top-0 z-30 bg-[#0F0F12]/90 backdrop-blur-md border-b border-white/10 px-6 py-4 transition-colors duration-300"
        >
          <div class="flex items-center justify-between">
            <div>
              <p class="text-sm text-orange-400 font-medium">Admin CMS</p>
              <h1 class="text-2xl font-bold">จัดการทริปเดินทาง</h1>
            </div>

            <a
              href="admin.html"
              class="bg-orange-400 hover:bg-orange-500 text-white font-bold py-2.5 px-6 rounded-xl shadow-lg transition flex items-center gap-2"
            >
              <i class="fa-solid fa-plus"></i>
              เพิ่มทริปใหม่
            </a>
          </div>
        </header>

        <section class="p-6 md:p-10">
          <div
            id="admin-card"
            class="bg-[#1E1E24] rounded-3xl shadow-xl border border-white/10 overflow-hidden transition-colors duration-300"
          >
            <table class="w-full text-left">
              <thead
                id="table-head"
                class="bg-[#111116] text-gray-300 uppercase text-xs font-bold tracking-wider transition-colors duration-300"
              >
                <tr>
                  <th class="px-6 py-4">ทริป</th>
                  <th class="px-6 py-4">หมวดหมู่</th>
                  <th class="px-6 py-4">วันที่เดินทาง</th>
                  <th class="px-6 py-4 text-center">คะแนน</th>
                  <th class="px-6 py-4 text-right">จัดการ</th>
                </tr>
              </thead>

              <tbody id="tripList" class="divide-y divide-white/10"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <script>
      function formatDate(dateStr) {
        if (!dateStr) return "-";
        const [y, m, d] = dateStr.split("-");
        return `${d}/${m}/${y}`;
      }

      function isLightMode() {
        return localStorage.getItem("adminTheme") === "light";
      }

      function rowClass() {
        return isLightMode()
          ? "hover:bg-slate-50 transition"
          : "hover:bg-white/5 transition";
      }

      function titleClass() {
        return isLightMode()
          ? "font-bold text-slate-800"
          : "font-bold text-white";
      }

      function metaClass() {
        return isLightMode()
          ? "text-xs text-slate-400"
          : "text-xs text-gray-500";
      }

      function bodyTextClass() {
        return isLightMode()
          ? "text-slate-500 text-sm"
          : "text-gray-400 text-sm";
      }

      async function loadTrips() {
        const res = await fetch(`${window.location.origin}/api/trips`, {
          credentials: "include",
        });
        const result = await res.json();
        const tbody = document.getElementById("tripList");

        tbody.innerHTML = "";

        result.data.forEach((trip) => {
          const rating = Number(trip.rating || 0).toFixed(2);

          const row = `
            <tr class="${rowClass()}">
              <td class="px-6 py-4">
                <div class="flex items-center gap-3">
                  <img
                    src="${trip.cover_image}"
                    class="w-12 h-12 rounded-lg object-cover bg-black/30"
                    onerror="this.src='https://via.placeholder.com/100'"
                  >
                  <div>
                    <div class="${titleClass()}">${trip.title}</div>
                    <div class="${metaClass()}">${trip.slug}</div>
                  </div>
                </div>
              </td>

              <td class="px-6 py-4 ${bodyTextClass()}">
                ${trip.category}
              </td>

              <td class="px-6 py-4 ${bodyTextClass()}">
                ${formatDate(trip.start_date)} - ${formatDate(trip.end_date)}
              </td>

              <td class="px-6 py-4 text-center font-bold text-orange-400">
                ${rating}
              </td>

              <td class="px-6 py-4 text-right space-x-2">
                <a
                  href="trip-detail.html?id=${trip.slug}"
                  target="_blank"
                  class="inline-flex items-center justify-center w-9 h-9 rounded-lg bg-white/10 text-gray-300 hover:bg-gray-600 hover:text-white transition"
                  title="Preview"
                >
                  <i class="fa-solid fa-eye"></i>
                </a>

                <a
                  href="admin.html?edit=${trip.slug}"
                  class="inline-flex items-center justify-center w-9 h-9 rounded-lg bg-blue-500/15 text-blue-400 hover:bg-blue-600 hover:text-white transition"
                  title="Edit"
                >
                  <i class="fa-solid fa-pen-to-square"></i>
                </a>

                <button
                  onclick="deleteTrip('${trip.slug}')"
                  class="inline-flex items-center justify-center w-9 h-9 rounded-lg bg-red-500/15 text-red-400 hover:bg-red-600 hover:text-white transition"
                  title="Delete"
                >
                  <i class="fa-solid fa-trash"></i>
                </button>
              </td>
            </tr>
          `;

          tbody.insertAdjacentHTML("beforeend", row);
        });
      }

      async function deleteTrip(slug) {
        if (!confirm("ลบทริปนี้ถาวร?")) return;

        const res = await fetch(`${window.location.origin}/api/trips/${slug}`, {
          method: "DELETE",
          credentials: "include",
        });

        if (res.ok) loadTrips();
      }

      function applyTheme() {
        const isLight = isLightMode();

        const body = document.getElementById("admin-body");
        const sidebar = document.getElementById("admin-sidebar");
        const header = document.getElementById("admin-header");
        const card = document.getElementById("admin-card");
        const tableHead = document.getElementById("table-head");
        const icon = document.getElementById("admin-theme-icon");

        if (isLight) {
          body.classList.remove("bg-[#0F0F12]", "text-white");
          body.classList.add("bg-slate-100", "text-slate-900");

          sidebar.classList.remove("bg-[#111116]", "border-white/10");
          sidebar.classList.add("bg-white", "border-slate-200");

          header.classList.remove("bg-[#0F0F12]/90", "border-white/10");
          header.classList.add("bg-white/90", "border-slate-200");

          card.classList.remove("bg-[#1E1E24]", "border-white/10");
          card.classList.add("bg-white", "border-slate-200");

          tableHead.classList.remove("bg-[#111116]", "text-gray-300");
          tableHead.classList.add("bg-slate-800", "text-slate-200");

          icon.className = "fa-solid fa-sun w-5 text-orange-400";
        } else {
          icon.className = "fa-solid fa-moon w-5 text-orange-400";
        }
      }

      document
        .getElementById("admin-theme-toggle")
        .addEventListener("click", () => {
          const current = isLightMode() ? "dark" : "light";
          localStorage.setItem("adminTheme", current);
          location.reload();
        });

      applyTheme();
      loadTrips();
    </script>
    <script>
      document
        .getElementById("logoutBtn")
        ?.addEventListener("click", async () => {
          await fetch(`${window.location.origin}/api/logout`, {
            method: "POST",
            credentials: "include",
          });

          window.location.href = "login.html";
        });
    </script>
  </body>
</html>
